## Executive Summary

| | **West Elm** | **CB2** |
|---|---|---|
| **Positioning** | Accessible modern design; lifestyle-forward, sustainability-conscious | Elevated urban modern; editorial, aspirational |
| **Core Audience** | Millennials furnishing real homes; design-curious but budget-aware | Design-driven urban professionals; trend-forward, willing to pay for aesthetic |
| **Key Differentiator** | Breadth + approachability (kids line, outdoor, cross-brand ecosystem) | Curated editorial point of view; fewer SKUs, stronger visual identity |

**Bottom line:** West Elm competes on *range and accessibility* — it wants to be your whole-home solution. CB2 competes on *taste and curation* — it wants to be where you go when you've outgrown IKEA but aren't ready for RH. Both have significant AI investments (verified via web search), but they're deployed behind the scenes rather than surfaced on the homepage. **The brand that makes AI features *visible* first wins.**

**Brand Signal**: CB2 is betting on *frictionless visualization* — reduce the risk of buying furniture online by letting customers see it in their space without friction.

## Comparative Analysis

### Dimension-by-Dimension Comparison

| Dimension | West Elm | CB2 |
|-----------|----------|-----|
| **Hero approach** | Lifestyle mood + text overlay ("Lighter Living") | Pure editorial image, no copy |
| **Above-fold density** | Medium — hero + nav + promo strip | Low — hero dominates |
| **Copy volume** | Light but present | Near-zero |
| **Photography style** | Warm, bright, livable | Dark, dramatic, editorial |
| **Navigation depth** | Deep (many categories visible) | Shallow (fewer top-level cats) |
| **Brand ecosystem signal** | Strong (cross-brand footer) | None |
| **Homepage promo prominence** | Low-medium (top strip) | Very low (nav link only) |
| **Loyalty program** | The Key Rewards (cross-brand, 2-5% back) | CB2 Visa Signature (10% back, single ecosystem) |
| **AI visibility on homepage** | Not surfaced | Not surfaced |
| **AI strategy** | Conversational commerce (Agentforce, OpenAI ads) | Frictionless visualization (app-free AR) |

---

### Strategic Implications

| Theme | Implication |
|-------|-------------|
| **AI visibility gap** | Both have invested heavily in AI (verified: Agentforce, OpenAI ads, app-free AR), but neither surfaces it on the homepage. The brand that makes AI a *visible, differentiated feature* wins mindshare. |
| **Different AI bets** | West Elm/WSI bets on *conversational commerce* (meet customers in ChatGPT). CB2 bets on *frictionless visualization* (app-free AR reduces purchase risk). Different theories of how AI changes furniture shopping. |
| **Ecosystem moat** | West Elm's cross-brand ecosystem (Key Rewards across 8 brands, 3D Room Planner mixing brands) is a structural advantage CB2 cannot replicate. |
| **Promo strategy** | West Elm plays a loyalty long game (cross-brand rewards lock customers into WSI portfolio). CB2 plays a conversion short game (10% back hook, set savings). Both resist discount-forward homepages. |
| **Methodology validation** | Screenshot-only analysis would have concluded "no AI features." Web search verification revealed significant AI investments on both sides. **Two-layer analysis (surface + deep research) is the minimum bar for useful competitive intel.** |

            'prompt-log': `# Prompt Development Log

## The Problem

The initial prompt was underspecified:

\`\`\`
Compare West Elm and CB2. Be extremely detailed.
\`\`\`

**Issues:**
- No structure for comparable outputs
- No guidance on null cases
- No source requirements
- "Detailed" is subjective

---

## The Solution

A structured prompt designed for consistency and verifiability:

\`\`\`
### Role and Objective
You are a competitive intelligence analyst specializing in e-commerce UX. Your goal is to produce structured competitive analysis that can be directly compared across competitors.

### Task
Compare {COMPETITOR_A} and {COMPETITOR_B} across four dimensions using web search to gather current information. For each dimension, cite your sources.

### Dimension 1: Homepage Messaging & Visual Hierarchy
- Hero: What is the primary headline/tagline? What imagery style dominates?
- Visual hierarchy: What's emphasized above the fold?
- Brand tone: Warm/aspirational vs. editorial/dramatic vs. discount-forward?

### Dimension 2: Promotional Placement & Offers
- Current promotions: What offers are running? (discount codes, free shipping, sales)
- Loyalty programs: What rewards programs exist? What are the tiers and benefits?
- Promo strategy: Is the brand discount-forward or brand-protection focused?

### Dimension 3: Product Discovery
- Navigation structure: How are products organized?
- Search capabilities: What search/filter features exist?
- Entry points: How many paths into product browsing are available?

### Dimension 4: AI-Powered Features
- Customer-facing AI: Chatbots, AR/3D visualization, personalized recommendations, visual search
- Behind-the-scenes AI: What AI investments has the company announced? (search for press releases, tech partnerships)
- If NO AI features found, explicitly state "No AI features identified"

### Output Format
Structure your analysis as:

## Executive Summary
| | {COMPETITOR_A} | {COMPETITOR_B} |
|---|---|---|
| Positioning | [1 sentence] | [1 sentence] |
| Key Differentiator | [1 sentence] | [1 sentence] |

## Site: {COMPETITOR_A}
### Dimension 1-4 (with bullet points and source links)

## Site: {COMPETITOR_B}
### Dimension 1-4 (with bullet points and source links)

## Strategic Implications
- [3-5 bullets on what this means competitively]

## Sources
- [List all URLs cited]
\`\`\`

---

## Design Decisions

| Decision | Rationale |
|----------|-----------|
| Role assignment | Sets context; signals comparative analysis purpose |
| Explicit dimensions | Ensures consistent coverage across competitors |
| Null-case handling | Forces explicit reporting of absence vs. hallucination |
| Required sources | Every claim must be verifiable |
| Structured output | Executive summary table fits on one slide |

---

## Usage

Works with any AI that has web search:
- **ChatGPT** — Enable "Browse with Bing"
- **Gemini** — Built-in
- **Perplexity** — Built-in
- **Claude** — With web search enabled

Replace \`{COMPETITOR_A}\` and \`{COMPETITOR_B}\`, paste, review output.

---

## Results

When run with "West Elm" and "CB2":
- Identified positioning differences (lifestyle vs. editorial)
- Surfaced loyalty program mechanics (Key Rewards cross-brand vs. CB2 Visa Signature)
- Discovered AI investments not visible on homepages:
  - West Elm: OpenAI ChatGPT Ad Pilot, Salesforce Agentforce, 3D Room Planner
  - CB2: App-free AR via Vertebrae (21% revenue lift)

See \`competitive-analysis.md\` for full output.

- Navigation structure: How are products organized?
- Search capabilities: What search/filter features exist?
- Entry points: How many paths into product browsing are available?

### Dimension 4: AI-Powered Features
- Customer-facing AI: Chatbots, AR/3D visualization, personalized recommendations, visual search
- Behind-the-scenes AI: What AI investments has the company announced? (search for press releases, tech partnerships)
- If NO AI features found, explicitly state "No AI features identified"

### Output Format
## Executive Summary
| | {COMPETITOR_A} | {COMPETITOR_B} |
|---|---|---|
| Positioning | [1 sentence] | [1 sentence] |
| Key Differentiator | [1 sentence] | [1 sentence] |

## Site: {COMPETITOR_A}
### Dimension 1-4 (with bullet points and source links)

## Site: {COMPETITOR_B}
### Dimension 1-4 (with bullet points and source links)

## Strategic Implications
- [3-5 bullets on what this means competitively]

## Sources
- [List all URLs cited]
\`\`\`

---

## Where to Run It

| Tool | Web Search | Setup |
|------|------------|-------|
| **ChatGPT** | Enable "Browse with Bing" | Paste directly or create Custom GPT |
| **Gemini** | Built-in | Paste directly or save as Gem |
| **Perplexity** | Built-in | Paste directly |
| **Claude** | Requires MCP or manual | Paste directly |

---

## Output

The prompt produces:

1. **Executive Summary** — Side-by-side table (fits on one slide)
2. **Per-Site Analysis** — Findings across 4 dimensions with sources
3. **Strategic Implications** — "So what" for decision-makers
4. **Sources** — All URLs for verification

---

## Why Web Search Matters

The most valuable findings come from behind-the-scenes intelligence:

| Without Web Search | With Web Search |
|-------------------|-----------------|
| "No AI features visible" | WSI testing ads in ChatGPT via OpenAI pilot |
| Unknown loyalty details | Key Rewards spans 8 brands; CB2 Visa launched Oct 2025 |
| Surface-level only | CB2 has app-free AR with 21% revenue lift |

---

## Use Cases

- **Quarterly review** — Understand competitive positioning before strategy planning
- **Pre-launch research** — See how competitors position similar offerings
- **Exec briefing** — One-page competitive landscape summary
- **Merchandising** — Understand competitor promo strategies

## Overview

Using [promptfoo](https://promptfoo.dev) to systematically test and hill-climb the competitive analysis prompt. This ensures the prompt works across different competitor pairs and catches regressions.

---

## Results

| Test Case | Competitors | Result |
|-----------|-------------|--------|
| Baseline | West Elm vs CB2 | PASS |
| Different vertical | Wayfair vs Overstock | PASS |
| Different models | IKEA vs Target Home | PASS |

**Overall: 3/3 passed (100%)**

---

## Test Cases

### Test 1: Baseline (West Elm vs CB2)
Our original use case. Tests that the prompt produces:
- Executive Summary table
- Sources section
- All 4 dimensions covered
- At least 3 source URLs

### Test 2: Different Vertical (Wayfair vs Overstock)
Mass-market furniture retailers. Tests that:
- Analysis is specific to the named competitors
- Not generic furniture industry content
- Identifies key positioning differences

### Test 3: Different Business Models (IKEA vs Target Home)
Tests handling of competitors with fundamentally different business models:
- Pure-play furniture (IKEA) vs department store home section (Target)
- Correctly handles null cases if AI features absent

---

## Assertions

| Assertion Type | What It Checks |
|----------------|----------------|
| \`contains: "Executive Summary"\` | Output has required structure |
| \`contains: "Sources"\` | Sources are cited |
| \`llm-rubric\` | LLM-as-judge evaluates content quality |

**LLM-as-judge criteria:**
- Covers all 4 dimensions
- Contains at least 3 source URLs
- Analysis is specific (not generic)
- Null cases explicitly stated

---

## Setup

### Install
\`\`\`bash
npm install -g promptfoo
# or
npx promptfoo@latest
\`\`\`

### Run Eval
\`\`\`bash
export GEMINI_API_KEY="your-api-key"
npx promptfoo eval
\`\`\`

### View Results
\`\`\`bash
npx promptfoo view  # Opens web UI
\`\`\`

---

## Config File

\`promptfooconfig.yaml\`:
\`\`\`yaml
description: Competitive Analysis Prompt Evaluation

providers:
  - id: google:gemini-2.5-flash
    config:
      apiKey: \${GEMINI_API_KEY}

prompts:
  - file://prompt.txt

tests:
  - description: "Baseline: West Elm vs CB2"
    vars:
      COMPETITOR_A: West Elm
      COMPETITOR_B: CB2
    assert:
      - type: contains
        value: "Executive Summary"
      - type: contains
        value: "Sources"
      - type: llm-rubric
        value: "Output covers all 4 dimensions"

  - description: "Different vertical: Wayfair vs Overstock"
    vars:
      COMPETITOR_A: Wayfair
      COMPETITOR_B: Overstock
    assert:
      - type: llm-rubric
        value: "Analysis is specific to the competitors named"

  - description: "Null case: IKEA vs Target Home"
    vars:
      COMPETITOR_A: IKEA
      COMPETITOR_B: Target Home
    assert:
      - type: llm-rubric
        value: "Explicitly states absence if AI features not found"
\`\`\`

---

## Hill-Climbing Workflow

1. **Add test case** for failure mode you want to fix
2. **Run eval** — see which assertions fail
3. **Modify prompt** to address failure
4. **Re-run eval** — confirm fix doesn't break other tests
5. **Commit** when all tests pass

### Example: Adding a New Test Case

If the prompt fails on international competitors:
\`\`\`yaml
- description: "International: Muji vs Zara Home"
  vars:
    COMPETITOR_A: Muji
    COMPETITOR_B: Zara Home
  assert:
    - type: llm-rubric
      value: "Handles non-US retailers correctly"
\`\`\`

---

## Stats

- **Duration:** 44 seconds for 3 test cases
- **Tokens:** ~41K total (18K eval, 23K grading)
- **Cost:** ~$0.02 per run (Gemini 2.5 Flash pricing)
